<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORGE</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Barlow+Condensed:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080808;
  --surface: #101010;
  --surface2: #161616;
  --border: #222;
  --dim: #2a2a2a;
  --muted: #555;
  --text: #ede9e0;
  --push: #d4f53c;
  --pull: #3cf5c4;
  --arms: #f53c8a;
  --circuit: #a855f7;
}

- { margin:0; padding:0; box-sizing:border-box; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘DM Mono’, monospace;
min-height: 100vh;
cursor: default;
}

/* Scanline effect */
body::after {
content:’’;
position:fixed;
inset:0;
background: repeating-linear-gradient(
0deg,
transparent,
transparent 2px,
rgba(0,0,0,0.03) 2px,
rgba(0,0,0,0.03) 4px
);
pointer-events:none;
z-index:9999;
}

.app {
max-width: 900px;
margin: 0 auto;
padding: 48px 24px 120px;
}

/* ── HEADER ── */
.header {
margin-bottom: 56px;
}

.logo-row {
display: flex;
align-items: flex-end;
gap: 16px;
margin-bottom: 6px;
}

.logo {
font-family: ‘Bebas Neue’, sans-serif;
font-size: clamp(72px, 14vw, 120px);
letter-spacing: 0.12em;
line-height: 0.9;
color: var(–text);
position: relative;
}

.logo::after {
content: ‘FORGE’;
position: absolute;
left: 3px;
top: 3px;
color: var(–push);
opacity: 0.15;
z-index: -1;
}

.version {
font-size: 10px;
letter-spacing: 0.3em;
color: var(–muted);
text-transform: uppercase;
padding-bottom: 16px;
font-family: ‘Barlow Condensed’, sans-serif;
font-weight: 400;
}

.subhead {
font-size: 11px;
letter-spacing: 0.18em;
color: var(–muted);
text-transform: uppercase;
font-family: ‘Barlow Condensed’, sans-serif;
font-weight: 300;
border-top: 1px solid var(–dim);
padding-top: 16px;
}

/* ── COMMAND BAR ── */
.command-bar {
display: flex;
gap: 0;
margin-bottom: 16px;
border: 1px solid var(–border);
}

.prompt-sym {
background: var(–surface);
color: var(–push);
font-family: ‘Bebas Neue’, sans-serif;
font-size: 26px;
padding: 14px 18px;
display: flex;
align-items: center;
border-right: 1px solid var(–border);
letter-spacing: 0.05em;
}

#cmd {
flex: 1;
background: var(–surface);
border: none;
color: var(–text);
font-family: ‘Bebas Neue’, sans-serif;
font-size: 32px;
letter-spacing: 0.14em;
padding: 14px 20px;
outline: none;
caret-color: var(–push);
text-transform: uppercase;
}

#cmd::placeholder {
color: var(–dim);
}

#go-btn {
background: var(–push);
color: #000;
border: none;
font-family: ‘Bebas Neue’, sans-serif;
font-size: 20px;
letter-spacing: 0.2em;
padding: 14px 32px;
cursor: pointer;
transition: opacity 0.15s, transform 0.1s;
text-transform: uppercase;
}

#go-btn:hover { opacity: 0.85; }
#go-btn:active { transform: scale(0.97); }

/* ── QUICK PILLS ── */
.pills {
display: flex;
gap: 8px;
margin-bottom: 52px;
}

.pill {
font-family: ‘Barlow Condensed’, sans-serif;
font-weight: 700;
font-size: 12px;
letter-spacing: 0.22em;
text-transform: uppercase;
padding: 8px 20px;
border: 1px solid var(–dim);
color: var(–muted);
cursor: pointer;
transition: all 0.15s;
user-select: none;
}

.pill[data-cmd=“push”]:hover { border-color: var(–push); color: var(–push); background: rgba(212,245,60,0.05); }
.pill[data-cmd=“pull”]:hover { border-color: var(–pull); color: var(–pull); background: rgba(60,245,196,0.05); }
.pill[data-cmd=“arms”]:hover { border-color: var(–arms); color: var(–arms); background: rgba(245,60,138,0.05); }

/* ── IDLE STATE ── */
.idle-state {
border: 1px dashed var(–dim);
padding: 64px 32px;
text-align: center;
}

.idle-title {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 48px;
letter-spacing: 0.1em;
color: var(–dim);
margin-bottom: 12px;
}

.idle-hint {
font-size: 11px;
letter-spacing: 0.15em;
color: var(–muted);
text-transform: uppercase;
font-family: ‘Barlow Condensed’, sans-serif;
}

.idle-hints {
display: flex;
justify-content: center;
gap: 32px;
margin-top: 28px;
}

.idle-cmd {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 28px;
letter-spacing: 0.12em;
}

.idle-cmd.push { color: rgba(212,245,60,0.35); }
.idle-cmd.pull { color: rgba(60,245,196,0.35); }
.idle-cmd.arms { color: rgba(245,60,138,0.35); }

/* ── WORKOUT OUTPUT ── */
.workout {
display: none;
animation: rise 0.45s cubic-bezier(0.22,1,0.36,1) forwards;
}

.workout.show { display: block; }

@keyframes rise {
from { opacity:0; transform: translateY(20px); }
to   { opacity:1; transform: translateY(0); }
}

/* Workout Header */
.wo-header {
margin-bottom: 40px;
}

.wo-type-label {
font-family: ‘Barlow Condensed’, sans-serif;
font-weight: 600;
font-size: 11px;
letter-spacing: 0.28em;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 4px;
}

.wo-title {
font-family: ‘Bebas Neue’, sans-serif;
font-size: clamp(48px, 10vw, 80px);
letter-spacing: 0.08em;
line-height: 1;
}

.wo-meta {
display: flex;
gap: 24px;
margin-top: 16px;
flex-wrap: wrap;
}

.wo-meta-item {
font-size: 14px;
letter-spacing: 0.12em;
color: var(–muted);
font-family: ‘Barlow Condensed’, sans-serif;
text-transform: uppercase;
}

.wo-meta-item span {
color: var(–text);
font-weight: 600;
}

/* Rounds */
.rounds { display: flex; flex-direction: column; gap: 3px; }

.round {
background: var(–surface);
padding: 0;
overflow: hidden;
position: relative;
}

.round-head {
display: flex;
align-items: center;
gap: 0;
border-bottom: 1px solid var(–dim);
}

.round-num {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 13px;
letter-spacing: 0.2em;
padding: 12px 20px;
border-right: 1px solid var(–dim);
color: var(–muted);
min-width: 80px;
text-align: center;
}

.round-desc {
font-family: ‘Barlow Condensed’, sans-serif;
font-weight: 600;
font-size: 16px;
letter-spacing: 0.16em;
text-transform: uppercase;
color: var(–muted);
padding: 12px 20px;
flex: 1;
}

.round-sets {
font-family: ‘DM Mono’, monospace;
font-size: 13px;
color: var(–muted);
padding: 12px 20px;
border-left: 1px solid var(–dim);
white-space: nowrap;
}

.round-body {
padding: 20px 24px 24px;
}

/* Exercise rows */
.ex {
display: grid;
grid-template-columns: 24px 1fr auto;
align-items: baseline;
gap: 12px;
padding: 11px 0;
border-bottom: 1px solid var(–surface2);
}

.ex:last-child { border-bottom: none; }

.ex-marker {
width: 6px;
height: 6px;
border-radius: 50%;
margin-top: 5px;
flex-shrink: 0;
}

.ex-name {
font-size: 17px;
font-weight: 400;
color: var(–text);
line-height: 1.4;
}

.ex-name em {
font-style: italic;
font-size: 13px;
color: var(–muted);
margin-left: 6px;
font-weight: 300;
}

.ex-scheme {
font-size: 14px;
color: var(–muted);
white-space: nowrap;
font-weight: 300;
text-align: right;
}

.badge {
display: inline-block;
font-family: ‘Barlow Condensed’, sans-serif;
font-weight: 700;
font-size: 11px;
letter-spacing: 0.16em;
text-transform: uppercase;
padding: 2px 7px;
margin-left: 7px;
position: relative;
top: -1px;
}

.badge-heavy  { background: rgba(212,180,60,0.12); color: #c8a830; }
.badge-hiit   { background: rgba(60,200,245,0.1);  color: #30c8f5; }
.badge-must   { background: rgba(255,255,255,0.06); color: #888; }
.badge-burnout{ background: rgba(245,60,138,0.1);   color: #f070a0; }
.badge-cardio { background: rgba(168,85,247,0.12);  color: #b070f0; }

/* Round 5 / Circuit */
.round-circuit {
background: var(–surface);
border-left: 3px solid var(–circuit);
margin-top: 8px;
}

.round-circuit .round-num { color: var(–circuit); }
.round-circuit .round-desc { color: #c090f0; }

.circuit-intro {
font-size: 14px;
letter-spacing: 0.1em;
color: var(–muted);
margin-bottom: 20px;
padding: 12px 16px;
background: var(–surface2);
border-left: 2px solid var(–circuit);
font-style: italic;
}

.circuit-intro strong {
color: var(–circuit);
font-style: normal;
}

/* Left accent bar per round */
.round { border-left: 3px solid var(–dim); }
.round.accent-push { border-left-color: rgba(212,245,60,0.4); }
.round.accent-pull { border-left-color: rgba(60,245,196,0.4); }
.round.accent-both { border-left-color: rgba(150,150,150,0.25); }

/* Arms day specifics */
.giant-set-label {
font-family: ‘Barlow Condensed’, sans-serif;
font-weight: 800;
font-size: 10px;
letter-spacing: 0.25em;
text-transform: uppercase;
color: var(–arms);
margin: 20px 0 8px;
opacity: 0.7;
}

.giant-set-label:first-child { margin-top: 0; }

/* Rest rules strip */
.rest-rules {
display: flex;
gap: 2px;
margin-top: 8px;
flex-wrap: wrap;
}

.rest-chip {
background: var(–surface);
border: 1px solid var(–dim);
font-size: 13px;
letter-spacing: 0.12em;
color: var(–muted);
padding: 6px 14px;
font-family: ‘Barlow Condensed’, sans-serif;
text-transform: uppercase;
}

.rest-chip span {
color: var(–text);
font-weight: 600;
}

/* Divider */
.section-div {
height: 1px;
background: var(–dim);
margin: 48px 0 40px;
}

/* Regenerate */
.regen-row {
margin-top: 36px;
display: flex;
gap: 8px;
align-items: center;
}

.regen-btn {
background: transparent;
border: 1px solid var(–dim);
color: var(–muted);
font-family: ‘Barlow Condensed’, sans-serif;
font-weight: 700;
font-size: 12px;
letter-spacing: 0.2em;
text-transform: uppercase;
padding: 10px 24px;
cursor: pointer;
transition: all 0.15s;
}

.regen-btn:hover {
border-color: var(–muted);
color: var(–text);
}

.wo-count {
font-size: 10px;
letter-spacing: 0.15em;
color: var(–dim);
font-family: ‘Barlow Condensed’, sans-serif;
text-transform: uppercase;
}

/* color helpers */
.c-push { color: var(–push); }
.c-pull { color: var(–pull); }
.c-arms { color: var(–arms); }
</style>

</head>
<body>
<div class="app">

  <!-- Header -->

  <div class="header">
    <div class="logo-row">
      <div class="logo">FORGE</div>
      <div class="version">v1.4</div>
    </div>
    <div class="subhead">Your personal workout engine — push · pull · arms</div>
  </div>

  <!-- Command bar -->

  <div class="command-bar">
    <div class="prompt-sym">_</div>
    <input id="cmd" type="text" placeholder="PUSH / PULL / ARMS" autocomplete="off" spellcheck="false" />
    <button id="go-btn" onclick="handleInput()">BUILD</button>
  </div>

  <!-- Quick pills -->

  <div class="pills">
    <div class="pill" data-cmd="push" onclick="quickCmd('push')">Push Day</div>
    <div class="pill" data-cmd="pull" onclick="quickCmd('pull')">Pull Day</div>
    <div class="pill" data-cmd="arms" onclick="quickCmd('arms')">Arms Day</div>
  </div>

  <!-- Idle state -->

  <div class="idle-state" id="idle">
    <div class="idle-title">AWAITING COMMAND</div>
    <div class="idle-hint">Type your day and hit build</div>
    <div class="idle-hints">
      <div class="idle-cmd push">PUSH</div>
      <div class="idle-cmd pull">PULL</div>
      <div class="idle-cmd arms">ARMS</div>
    </div>
  </div>

  <!-- Workout output -->

  <div class="workout" id="workout"></div>

</div>

<script>

    { name: 'DB Front Raise', scheme: '3×15–20', badge: 'hiit' },
    { name: 'Tyson Push-Ups', scheme: '3×15–20', badge: 'hiit' },
    { name: 'Pike Push-Ups', scheme: '3×15–20', badge: 'hiit' },

  // HINGE — heavy (3–4 sets, cleans capped at 4–6 reps)

    { name: 'DB RDL', scheme: '3–4×10–12', badge: 'heavy', must: true },

// ARMS day — balanced for width, rear delt health, and bicep peak/width
const ARMS_PROGRAM = [
  {
    label: 'Giant Set A — Shoulder Width (3 rounds)',
    exercises: [
      { name: 'DB Lateral Raise', scheme: '15–20 reps', badge: 'must' },

    ]
  },

// Cardio options for round 5
const CARDIO_BLOCKS = [
  {
    machine: 'Assault Bike + SkiErg',
    protocol: '10 min EMOM',
    work: [
      'Minute 1–2: Assault Bike — max effort sprint',

  {

// ─── HELPERS ──────────────────────────────────────────────────────────────────

function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function pick(arr, n) {
  const shuffled = [...arr].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, n);
}

let genCount = 0;

// ─── RENDERERS ────────────────────────────────────────────────────────────────

function renderEx(ex, accentColor) {
  const markerColor = accentColor;
  const badgeMap = {
    heavy: '<span class="badge badge-heavy">Heavy</span>',
    hiit:  '<span class="badge badge-hiit">HIIT</span>',
    must:  '<span class="badge badge-must">Must</span>',
    burnout: '<span class="badge badge-burnout">Burnout</span>',
    cardio: '<span class="badge badge-cardio">Cardio</span>',
    '': '',
  };
  const mustNote = ex.must ? `<em>must-do</em>` : '';
  return `
    <div class="ex">
      <div class="ex-marker" style="background:${markerColor}; opacity:${ex.must?1:0.35}"></div>
      <div class="ex-name">${ex.name}${mustNote}${badgeMap[ex.badge]||''}</div>
      <div class="ex-scheme">${ex.scheme}</div>
    </div>`;
}

function renderRound(num, desc, exercises, accent, isCircuit=false) {
  const accentClass = isCircuit ? '' : (accent==='push'?'accent-push':accent==='pull'?'accent-pull':'accent-both');
  const accentColor = accent==='push' ? 'var(--push)' : accent==='pull' ? 'var(--pull)' : 'var(--arms)';

  return `
    <div class="round ${isCircuit?'round-circuit':accentClass}">
      <div class="round-head">
        <div class="round-num">RD ${num}</div>
        <div class="round-desc">${desc}</div>
        ${isCircuit ? '' : '<div class="round-sets">3 sets · 60–90s rest</div>'}
      </div>
      <div class="round-body">
        ${exercises.map(ex => renderEx(ex, accentColor)).join('')}
      </div>
    </div>`;
}

function renderCircuit() {
  const block = rand(CARDIO_BLOCKS);
  const accentColor = 'var(--circuit)';
  const items = block.work.map(w => `
    <div class="ex">
      <div class="ex-marker" style="background:var(--circuit); opacity:0.6"></div>
      <div class="ex-name">${w}</div>
      <div class="ex-scheme"></div>
    </div>`).join('');
  return `
    <div class="round round-circuit">
      <div class="round-head">
        <div class="round-num">RD 5</div>
        <div class="round-desc">High Intensity Circuit — ${block.protocol}</div>
      </div>
      <div class="round-body">
        <div class="circuit-intro">Equipment: <strong>${block.machine}</strong> — Continuous work, no rest between exercises</div>
        ${items}
      </div>
    </div>`;
}

// ─── PUSH WORKOUT ─────────────────────────────────────────────────────────────

function buildPush() {
  const hl1 = rand(PUSH.heavyLower.filter(e=>e.must));
  const hl2 = rand(PUSH.heavyLower.filter(e=>e.name!==hl1.name));
  const hu1 = rand(PUSH.heavyUpper.filter(e=>e.must));
  const hu2 = rand(PUSH.heavyUpper.filter(e=>e.name!==hu1.name));
  const hiU1 = rand(PUSH.hiitUpper);
  const hiU2 = rand(PUSH.hiitUpper.filter(e=>e.name!==hiU1.name));
  const hiL1 = rand(PUSH.hiitLower);
  const hiL2 = rand(PUSH.hiitLower.filter(e=>e.name!==hiL1.name));

  const rounds = [
    { desc: 'Heavy Lower + High Intensity Upper', exs: [hl1, hiU1] },
    { desc: 'Heavy Upper + High Intensity Lower', exs: [hu1, hiL1] },
    { desc: 'Heavy Lower + High Intensity Lower', exs: [hl2, hiL2] },
    { desc: 'Heavy Upper + High Intensity Upper', exs: [hu2, hiU2] },
  ];

  return `
    <div class="wo-header">
      <div class="wo-type-label">Today's session</div>
      <div class="wo-title c-push">PUSH DAY</div>
      <div class="wo-meta">
        <div class="wo-meta-item">Time: <span>35–45 min</span></div>
        <div class="wo-meta-item">Rounds: <span>5</span></div>
        <div class="wo-meta-item">Sets: <span>3 per round</span></div>
        <div class="wo-meta-item">Rest between rounds: <span>2 min</span></div>
      </div>
    </div>
    <div class="rounds">
      ${rounds.map((r,i) => renderRound(i+1, r.desc, r.exs, 'push')).join('')}
      ${renderCircuit()}
    </div>`;
}

// ─── PULL WORKOUT ─────────────────────────────────────────────────────────────

function buildPull() {
  const hh1 = rand(PULL.heavyHinge.filter(e=>e.must));
  const hh2 = rand(PULL.heavyHinge.filter(e=>e.name!==hh1.name));
  const hu1 = rand(PULL.heavyUpper.filter(e=>e.must));
  const hu2 = rand(PULL.heavyUpper.filter(e=>e.name!==hu1.name));
  const hiL1 = rand(PULL.hiitLower);
  const hiL2 = rand(PULL.hiitLower.filter(e=>e.name!==hiL1.name));
  const hiU1 = rand(PULL.hiitUpper);
  const hiU2 = rand(PULL.hiitUpper.filter(e=>e.name!==hiU1.name));

  const rounds = [
    { desc: 'Heavy Hinge + High Intensity Upper', exs: [hh1, hiU1] },
    { desc: 'Heavy Upper + High Intensity Lower', exs: [hu1, hiL1] },
    { desc: 'Heavy Hinge + High Intensity Lower', exs: [hh2, hiL2] },
    { desc: 'Heavy Upper + High Intensity Upper', exs: [hu2, hiU2] },
  ];

  return `
    <div class="wo-header">
      <div class="wo-type-label">Today's session</div>
      <div class="wo-title c-pull">PULL DAY</div>
      <div class="wo-meta">
        <div class="wo-meta-item">Time: <span>35–45 min</span></div>
        <div class="wo-meta-item">Rounds: <span>5</span></div>
        <div class="wo-meta-item">Sets: <span>3 per round</span></div>
        <div class="wo-meta-item">Rest between rounds: <span>2 min</span></div>
      </div>
    </div>
    <div class="rounds">
      ${rounds.map((r,i) => renderRound(i+1, r.desc, r.exs, 'pull')).join('')}
      ${renderCircuit()}
    </div>`;
}

// ─── ARMS WORKOUT ─────────────────────────────────────────────────────────────

function buildArms() {
  const badgeMap = {
    heavy:   '<span class="badge badge-heavy">Heavy</span>',
    hiit:    '<span class="badge badge-hiit">HIIT</span>',
    must:    '<span class="badge badge-must">Focus</span>',
    burnout: '<span class="badge badge-burnout">Burnout</span>',
    '': '',
  };
  const color = 'var(--arms)';

  const blocks = ARMS_PROGRAM.map(block => {
    const exRows = block.exercises.map(ex => `
      <div class="ex">
        <div class="ex-marker" style="background:${color}; opacity:0.55"></div>
        <div class="ex-name">${ex.name}${badgeMap[ex.badge]||''}</div>
        <div class="ex-scheme">${ex.scheme}</div>
      </div>`).join('');
    return `
      <div class="round accent-both" style="border-left-color:rgba(245,60,138,0.4)">
        <div class="round-head">
          <div class="round-num" style="color:var(--arms); opacity:0.8">●</div>
          <div class="round-desc">${block.label}</div>
        </div>
        <div class="round-body">${exRows}</div>
      </div>`;
  }).join('');

  return `
    <div class="wo-header">
      <div class="wo-type-label">Today's session</div>
      <div class="wo-title c-arms">ARMS DAY</div>
      <div class="wo-meta">
        <div class="wo-meta-item">Time: <span>30 min</span></div>
        <div class="wo-meta-item">Format: <span>Giant Sets + Drop Sets + Burnout</span></div>
        <div class="wo-meta-item">Focus: <span>Lateral delts · Rear delts · Long head tri · Bicep peak</span></div>
      </div>
    </div>
    <div class="rounds">${blocks}</div>`;
}

// ─── MAIN ─────────────────────────────────────────────────────────────────────

function generate(type) {
  genCount++;
  const workoutEl = document.getElementById('workout');
  const idleEl    = document.getElementById('idle');

  let inner = '';
  if (type === 'push') inner = buildPush();
  else if (type === 'pull') inner = buildPull();
  else if (type === 'arms') inner = buildArms();
  else {
    alert('Type PUSH, PULL, or ARMS');
    return;
  }

  // Rest rules strip
  const restStrip = type !== 'arms' ? `
    <div class="rest-rules">
      <div class="rest-chip">Heavy: <span>3–4×10–12</span></div>
      <div class="rest-chip">High Intensity: <span>3×15–20</span></div>
      <div class="rest-chip">Sets rest: <span>60–90 sec</span></div>
      <div class="rest-chip">Round transition: <span>2 min</span></div>
      <div class="rest-chip">Circuit: <span>Continuous</span></div>
      <div class="rest-chip">Total time: <span>35–45 min</span></div>
    </div>` : `
    <div class="rest-rules">
      <div class="rest-chip">Moderate: <span>12–15 reps</span></div>
      <div class="rest-chip">Burnout: <span>15–20 reps</span></div>
      <div class="rest-chip">Giant set rest: <span>10–15 sec only</span></div>
      <div class="rest-chip">Between blocks: <span>90 sec</span></div>
      <div class="rest-chip">Total time: <span>~30 min</span></div>
    </div>`;

  const regenRow = `
    <div class="regen-row">
      <button class="regen-btn" onclick="generate('${type}')">↺ New ${type.toUpperCase()} Workout</button>
      <div class="wo-count">Session #${genCount} generated</div>
    </div>`;

  workoutEl.innerHTML = inner + restStrip + regenRow;
  idleEl.style.display = 'none';
  workoutEl.classList.remove('show');
  workoutEl.style.display = 'none';
  // Force reflow for animation
  void workoutEl.offsetWidth;
  workoutEl.style.display = 'block';
  workoutEl.classList.add('show');
  workoutEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function handleInput() {
  const val = document.getElementById('cmd').value.trim().toLowerCase();
  if (['push','pull','arms'].includes(val)) {
    generate(val);
    document.getElementById('cmd').value = '';
  } else {
    document.getElementById('cmd').style.borderBottom = '2px solid red';
    setTimeout(() => document.getElementById('cmd').style.borderBottom = '', 600);
  }
}

function quickCmd(type) {
  document.getElementById('cmd').value = type;
  generate(type);
  document.getElementById('cmd').value = '';
}

document.getElementById('cmd').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleInput();
});

// Update button color based on input
document.getElementById('cmd').addEventListener('input', function() {
  const v = this.value.trim().toLowerCase();
  const btn = document.getElementById('go-btn');
  if (v === 'push') { btn.style.background = 'var(--push)'; btn.style.color = '#000'; }
  else if (v === 'pull') { btn.style.background = 'var(--pull)'; btn.style.color = '#000'; }
  else if (v === 'arms') { btn.style.background = 'var(--arms)'; btn.style.color = '#fff'; }
  else { btn.style.background = 'var(--push)'; btn.style.color = '#000'; }
});
</script>
