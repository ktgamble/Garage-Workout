<!DOCTYPE html>

<html lang="en" style="background:#0f1117;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORGE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
html, body {
  background: #0f1117 !important;
}

:root {
–bg: #0f1117;
–surface: #1a1d2e;
–surface2: #222640;
–card: #1e2235;
–border: #2a2f4a;
–text: #ffffff;
–text-muted: #7b82a0;
–text-dim: #4a5170;
–push: #7c6af5;
–push-light: #a89cf8;
–pull: #4ab8f5;
–pull-light: #7dd0f8;
–arms: #f5834a;
–arms-light: #f8a87d;
–green: #4ac98a;
–green-dark: #38a870;
–yellow: #f5c84a;
–red: #f55a4a;
–circuit: #c8a847;
}

- { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing: antialiased; }

body {
background: #0f1117 !important;
background-color: #0f1117 !important;
color: var(–text);
font-family: ‘Inter’, -apple-system, BlinkMacSystemFont, ‘Segoe UI’, sans-serif;
min-height: 100vh;
}

.app {
max-width: 480px;
margin: 0 auto;
padding: 32px 16px 80px;
}

/* ── HEADER ── */
.header {
text-align: center;
margin-bottom: 28px;
padding: 0 4px;
}

.header-eyebrow {
font-size: 11px;
font-weight: 600;
letter-spacing: 0.2em;
text-transform: uppercase;
color: var(–text-muted);
margin-bottom: 8px;
}

.logo {
font-size: 42px;
font-weight: 800;
color: var(–text);
letter-spacing: -0.02em;
margin-bottom: 6px;
}

.header-sub {
font-size: 14px;
color: var(–text-muted);
font-weight: 400;
}

/* ── TAB SELECTOR ── */
.tab-row {
display: grid;
grid-template-columns: 1fr 1fr 1fr;
gap: 6px;
background: var(–surface);
border-radius: 16px;
padding: 6px;
margin-bottom: 16px;
}

.tab {
padding: 12px 8px;
border-radius: 12px;
text-align: center;
cursor: pointer;
font-size: 14px;
font-weight: 600;
color: var(–text-muted);
transition: all 0.2s;
user-select: none;
}

.tab:hover { color: var(–text); background: var(–surface2); }
.tab.active-push { background: var(–push); color: #fff; }
.tab.active-pull { background: var(–pull); color: #0f1117; }
.tab.active-arms { background: var(–arms); color: #fff; }

/* ── COMMAND BAR ── */
.command-bar {
display: flex;
gap: 8px;
margin-bottom: 24px;
align-items: center;
}

#cmd {
flex: 1;
background: var(–surface);
border: 1.5px solid var(–border);
border-radius: 14px;
color: var(–text);
font-family: ‘Inter’, sans-serif;
font-size: 18px;
font-weight: 600;
letter-spacing: 0.06em;
padding: 14px 18px;
outline: none;
text-transform: uppercase;
transition: border-color 0.2s;
}

#cmd:focus { border-color: var(–push); }
#cmd::placeholder { color: var(–text-dim); font-size: 14px; font-weight: 400; text-transform: none; letter-spacing: 0; }

#go-btn {
background: var(–push);
color: #fff;
border: none;
border-radius: 14px;
font-family: ‘Inter’, sans-serif;
font-size: 15px;
font-weight: 700;
padding: 14px 22px;
cursor: pointer;
transition: all 0.15s;
white-space: nowrap;
}

#go-btn:hover { opacity: 0.9; transform: scale(0.98); }
#go-btn:active { transform: scale(0.95); }

/* ── IDLE STATE ── */
.idle-state {
background: var(–surface);
border-radius: 20px;
padding: 52px 24px;
text-align: center;
border: 1.5px solid var(–border);
}

.idle-title {
font-size: 22px;
font-weight: 700;
color: var(–text-muted);
margin-bottom: 8px;
}

.idle-hint {
font-size: 14px;
color: var(–text-dim);
margin-bottom: 28px;
}

.idle-hints {
display: flex;
justify-content: center;
gap: 10px;
}

.idle-chip {
padding: 8px 20px;
border-radius: 50px;
font-size: 14px;
font-weight: 700;
cursor: pointer;
transition: all 0.15s;
}

.idle-chip.push { background: rgba(124,106,245,0.15); color: var(–push-light); }
.idle-chip.pull { background: rgba(74,184,245,0.15); color: var(–pull-light); }
.idle-chip.arms { background: rgba(245,131,74,0.15); color: var(–arms-light); }
.idle-chip:hover { transform: scale(1.05); }

/* ── WORKOUT OUTPUT ── */
.workout { display: none; }
.workout.show { display: block; animation: rise 0.35s ease forwards; }

@keyframes rise {
from { opacity:0; transform: translateY(14px); }
to   { opacity:1; transform: translateY(0); }
}

/* Workout Header Card */
.wo-header-card {
background: var(–surface);
border-radius: 20px;
padding: 22px 20px;
margin-bottom: 12px;
border: 1.5px solid var(–border);
}

.wo-eyebrow {
font-size: 11px;
font-weight: 600;
letter-spacing: 0.18em;
text-transform: uppercase;
margin-bottom: 6px;
}

.wo-title {
font-size: 36px;
font-weight: 800;
letter-spacing: -0.02em;
margin-bottom: 14px;
line-height: 1.1;
}

.wo-meta-row {
display: flex;
gap: 6px;
flex-wrap: wrap;
}

.wo-chip {
background: var(–surface2);
border-radius: 50px;
padding: 5px 12px;
font-size: 12px;
font-weight: 500;
color: var(–text-muted);
}

/* Rounds */
.rounds { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }

.round {
background: var(–card);
border-radius: 18px;
overflow: hidden;
border: 1.5px solid var(–border);
}

.round-head {
padding: 16px 18px 12px;
border-bottom: 1px solid var(–border);
}

.round-label {
font-size: 11px;
font-weight: 700;
letter-spacing: 0.16em;
text-transform: uppercase;
margin-bottom: 4px;
}

.round-title {
font-size: 17px;
font-weight: 700;
color: var(–text);
line-height: 1.3;
}

.round-meta {
font-size: 12px;
color: var(–text-muted);
margin-top: 3px;
}

.round-body { padding: 4px 0; }

/* Exercise rows */
.ex {
display: flex;
align-items: center;
padding: 13px 18px;
border-bottom: 1px solid rgba(42,47,74,0.6);
gap: 12px;
}

.ex:last-child { border-bottom: none; }

.ex-dot {
width: 8px;
height: 8px;
border-radius: 50%;
flex-shrink: 0;
}

.ex-name {
flex: 1;
font-size: 16px;
font-weight: 500;
color: var(–text);
line-height: 1.3;
}

.ex-scheme {
font-size: 13px;
font-weight: 600;
color: var(–text-muted);
white-space: nowrap;
background: var(–surface2);
padding: 4px 10px;
border-radius: 8px;
}

.badge {
font-size: 10px;
font-weight: 700;
letter-spacing: 0.1em;
text-transform: uppercase;
padding: 3px 8px;
border-radius: 6px;
margin-left: 6px;
flex-shrink: 0;
}

.badge-heavy  { background: rgba(245,200,74,0.15); color: var(–yellow); }
.badge-hiit   { background: rgba(74,184,245,0.15); color: var(–pull); }
.badge-must   { background: rgba(74,201,138,0.12); color: var(–green); }
.badge-burnout{ background: rgba(245,90,74,0.15);  color: var(–red); }
.badge-cardio { background: rgba(200,168,71,0.15); color: var(–circuit); }

/* Circuit round */
.round-circuit { border-color: rgba(74,201,138,0.3); }
.round-circuit .round-label { color: var(–green); }

.circuit-intro {
margin: 10px 18px 4px;
padding: 10px 14px;
background: rgba(74,201,138,0.07);
border-radius: 10px;
font-size: 13px;
color: var(–text-muted);
font-weight: 500;
}

.circuit-intro strong { color: var(–green); }

/* Rest rules */
.rest-rules {
background: var(–surface);
border-radius: 18px;
border: 1.5px solid var(–border);
padding: 16px 18px;
margin-bottom: 12px;
}

.rest-rules-title {
font-size: 11px;
font-weight: 700;
letter-spacing: 0.16em;
text-transform: uppercase;
color: var(–text-muted);
margin-bottom: 12px;
}

.rest-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 8px;
}

.rest-item {
background: var(–card);
border-radius: 12px;
padding: 10px 12px;
}

.rest-item-label {
font-size: 11px;
color: var(–text-dim);
font-weight: 500;
margin-bottom: 2px;
}

.rest-item-value {
font-size: 14px;
font-weight: 700;
color: var(–text);
}

/* Regen button */
.regen-btn {
width: 100%;
background: var(–surface);
border: 1.5px solid var(–border);
border-radius: 16px;
color: var(–text-muted);
font-family: ‘Inter’, sans-serif;
font-weight: 600;
font-size: 15px;
padding: 16px;
cursor: pointer;
transition: all 0.15s;
margin-bottom: 10px;
}

.regen-btn:hover { border-color: var(–push); color: var(–text); }

.wo-count {
text-align: center;
font-size: 12px;
color: var(–text-dim);
margin-bottom: 16px;
}

/* Arms blocks */
.arms-block-label {
font-size: 11px;
font-weight: 700;
letter-spacing: 0.16em;
text-transform: uppercase;
color: var(–arms-light);
}

/* color helpers */
.c-push { color: var(–push-light); }
.c-pull { color: var(–pull-light); }
.c-arms { color: var(–arms-light); }
.c-green { color: var(–green); }
</style>

</head>
<body>
<div class="app">

  <!-- Header -->

  <div class="header">
    <div class="header-eyebrow">Garage Workout System</div>
    <div class="logo">FORGE</div>
    <div class="header-sub">Push · Pull · Arms</div>
  </div>

  <!-- Tab row -->

  <div class="tab-row">
    <div class="tab" id="tab-push" onclick="quickCmd('push')">Push Day</div>
    <div class="tab" id="tab-pull" onclick="quickCmd('pull')">Pull Day</div>
    <div class="tab" id="tab-arms" onclick="quickCmd('arms')">Arms Day</div>
  </div>

  <!-- Command bar -->

  <div class="command-bar">
    <input id="cmd" type="text" placeholder="Or type push / pull / arms..." autocomplete="off" spellcheck="false" />
    <button id="go-btn" onclick="handleInput()">Go</button>
  </div>

  <!-- Idle state -->

  <div class="idle-state" id="idle">
    <div class="idle-title">Ready when you are</div>
    <div class="idle-hint">Select a workout type above to get started</div>
    <div class="idle-hints">
      <div class="idle-chip push" onclick="quickCmd('push')">Push</div>
      <div class="idle-chip pull" onclick="quickCmd('pull')">Pull</div>
      <div class="idle-chip arms" onclick="quickCmd('arms')">Arms</div>
    </div>
  </div>

  <!-- Workout output -->

  <div class="workout" id="workout"></div>

</div>

<script>
const PUSH = {
  heavyLower: [
    { name: 'Sandbag Front Squat', scheme: '3–4×10–12', badge: 'heavy', must: true },
    { name: 'Sandbag Back Squat', scheme: '3–4×10–12', badge: 'heavy', must: true },
    { name: 'Sandbag Walking Lunges', scheme: '3–4×10–12/leg', badge: 'heavy', must: true },
    { name: 'Sandbag Zercher Squat', scheme: '3–4×10–12', badge: 'heavy' },
  ],
  heavyUpper: [
    { name: 'DB Incline Press', scheme: '3–4×10–12', badge: 'heavy', must: true },
    { name: 'DB Flat Chest Press', scheme: '3–4×10–12', badge: 'heavy', must: true },
    { name: 'Dips', scheme: '3–4×10–12', badge: 'heavy', must: true },
    { name: 'DB Overhead Press', scheme: '3–4×10–12', badge: 'heavy' },
    { name: 'DB Arnold Press', scheme: '3–4×10–12', badge: 'heavy' },
  ],
  hiitLower: [
    { name: 'Slam Ball Squat Jumps', scheme: '3×15–20', badge: 'hiit' },
    { name: 'KB Goblet Squat', scheme: '3×15–20', badge: 'hiit' },
    { name: 'Alternating DB Reverse Lunges', scheme: '3×15–20/leg', badge: 'hiit' },
    { name: 'Jump Squats', scheme: '3×15–20', badge: 'hiit' },
    { name: 'Sandbag Lateral Lunge', scheme: '3×15–20/leg', badge: 'hiit' },
    { name: 'KB Single Arm Front Squat', scheme: '3×15–20/side', badge: 'hiit' },
  ],
  hiitUpper: [
    { name: 'DB Push Press', scheme: '3×15–20', badge: 'hiit' },
    { name: 'Ring Tricep Extension', scheme: '3×15–20', badge: 'hiit' },
    { name: 'DB Lateral Raise', scheme: '3×15–20', badge: 'hiit' },
    { name: 'DB Front Raise', scheme: '3×15–20', badge: 'hiit' },
    { name: 'Tyson Push-Ups', scheme: '3×15–20', badge: 'hiit' },
    { name: 'Pike Push-Ups', scheme: '3×15–20', badge: 'hiit' },
    { name: 'Dive Bomber Push-Ups', scheme: '3×15–20', badge: 'hiit' },
    { name: 'Slam Ball Chest Pass (wall)', scheme: '3×15–20', badge: 'hiit' },
    { name: 'DB Skull Crushers', scheme: '3×15–20', badge: 'hiit' },
  ],
};

const PULL = {
  heavyHinge: [
    { name: 'DB RDL', scheme: '3–4×10–12', badge: 'heavy', must: true },
    { name: 'Single Leg DB RDL', scheme: '3–4×10–12/leg', badge: 'heavy', must: true },
    { name: 'Sandbag Clean', scheme: '3–4×4–6', badge: 'heavy', must: true },
    { name: 'Sandbag Shoulder Slam', scheme: '3–4×10 (5/side)', badge: 'heavy', must: true },
    { name: 'KB Clean', scheme: '3–4×10–12/side', badge: 'heavy', must: true },
  ],
  heavyUpper: [
    { name: 'Weighted Pull-Ups', scheme: '3–4×10–12', badge: 'heavy', must: true },
    { name: 'Gorilla Row', scheme: '3–4×10–12/side', badge: 'heavy', must: true },
    { name: 'DB Bent Over Row', scheme: '3–4×10–12', badge: 'heavy', must: true },
    { name: 'Ring Rows', scheme: '3–4×10–12', badge: 'heavy', must: true },
    { name: 'DB Chest Supported Row', scheme: '3–4×10–12', badge: 'heavy' },
  ],
  hiitLower: [
    { name: 'KB Swing', scheme: '3×15–20', badge: 'hiit' },
    { name: 'DB Snatch', scheme: '3×15–20/side', badge: 'hiit' },
    { name: 'KB Single Arm Swing', scheme: '3×15–20/side', badge: 'hiit' },
    { name: 'Sandbag Rotational Slam', scheme: '3×10 (5/side)', badge: 'hiit' },
    { name: 'KB Deadlift High Pull', scheme: '3×15–20', badge: 'hiit' },
  ],
  hiitUpper: [
    { name: 'Ring Row Hold Negatives', scheme: '3×15–20', badge: 'hiit' },
    { name: 'DB Face Pulls', scheme: '3×15–20', badge: 'hiit' },
    { name: 'Banded Pull-Aparts', scheme: '3×15–20', badge: 'hiit' },
    { name: 'Inverted Row', scheme: '3×15–20', badge: 'hiit' },
    { name: 'KB Renegade Row', scheme: '3×15–20/side', badge: 'hiit' },
    { name: 'TRX / Ring Bicep Curl', scheme: '3×15–20', badge: 'hiit' },
  ],
};

const ARMS_PROGRAM = [
  {
    label: 'Giant Set A — Shoulder Width',
    exercises: [
      { name: 'DB Lateral Raise', scheme: '15–20 reps', badge: 'must' },
      { name: 'DB Leaning Lateral Raise', scheme: '15–20/side', badge: 'must' },
      { name: 'DB Upright Row', scheme: '12–15 reps', badge: 'must' },
      { name: '10 sec rest, repeat', scheme: '×3', badge: '' },
    ]
  },
  {
    label: 'Giant Set B — Rear Delt + Pulling Balance',
    exercises: [
      { name: 'DB Bent Over Rear Delt Fly', scheme: '15–20 reps', badge: 'must' },
      { name: 'DB Face Pull', scheme: '15–20 reps', badge: 'must' },
      { name: 'Ring Row — wide grip', scheme: '12–15 reps', badge: 'must' },
      { name: '15 sec rest, repeat', scheme: '×3', badge: '' },
    ]
  },
  {
    label: 'Giant Set C — Bicep Width + Peak',
    exercises: [
      { name: 'DB Wide-Grip Curl (supinated)', scheme: '12–15 reps', badge: 'must' },
      { name: 'DB Incline Curl (long head stretch)', scheme: '12–15 reps', badge: 'must' },
      { name: 'DB Hammer Curl (brachialis width)', scheme: '12–15 reps', badge: 'must' },
      { name: '10 sec rest, repeat', scheme: '×3', badge: '' },
    ]
  },
  {
    label: 'Drop Set — Tricep Long Head',
    exercises: [
      { name: 'DB Overhead Tricep Extension', scheme: '12→10→8 drop wt', badge: 'burnout' },
      { name: 'Skull Crushers', scheme: '12→10→8 drop wt', badge: 'burnout' },
      { name: 'Tricep Dips (BW)', scheme: 'to failure', badge: 'burnout' },
    ]
  },
  {
    label: 'Burnout Finisher — 8 min AMRAP',
    exercises: [
      { name: 'DB Lateral Raise ×15–20', scheme: 'continuous', badge: 'burnout' },
      { name: 'DB Wide-Grip Curl ×15', scheme: 'continuous', badge: 'burnout' },
      { name: 'DB Hammer Curl ×12', scheme: 'continuous', badge: 'burnout' },
      { name: 'Tricep Push-Down (band) ×15–20', scheme: 'continuous', badge: 'burnout' },
    ]
  },
];

const CARDIO_BLOCKS = [
  {
    machine: 'Assault Bike + SkiErg',
    protocol: '10 min EMOM',
    work: [
      'Minute 1–2: Assault Bike — max effort sprint',
      'Minute 3–4: SkiErg — 250m hard pull',
      'Minute 5: Slam Ball Slams ×15',
      'Minute 6–7: Assault Bike — 20 sec on / 10 sec off ×4',
      'Minute 8–9: SkiErg — arms-only 30 sec on / 30 off',
      'Minute 10: All-out Assault Bike to failure',
    ]
  },
  {
    machine: 'SkiErg + Battle Rope',
    protocol: '12 min Circuit',
    work: [
      '40 sec SkiErg max effort — 20 sec rest',
      '40 sec Battle Rope alternating waves — 20 sec rest',
      '40 sec Battle Rope slams — 20 sec rest',
      '40 sec SkiErg arms only — 20 sec rest',
      'Repeat 3 rounds',
    ]
  },
  {
    machine: 'Assault Bike',
    protocol: '15 min Tabata Ladder',
    work: [
      'Rounds 1–3: 20 sec sprint / 10 sec rest',
      'Rounds 4–6: 30 sec sprint / 15 sec rest',
      'Rounds 7–9: 40 sec sprint / 20 sec rest',
      'Final: 60 sec all-out, no rest',
    ]
  },
  {
    machine: 'SkiErg + Slam Ball',
    protocol: '10 min AMRAP',
    work: [
      '10 Slam Ball ground slams',
      '10 cal SkiErg sprint',
      '5 Slam Ball rotational slams/side',
      'Rest 20 sec — repeat',
    ]
  },
];

function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
let genCount = 0;

function dotColor(type) {
  if (type === 'push') return 'var(--push)';
  if (type === 'pull') return 'var(--pull)';
  if (type === 'arms') return 'var(--arms)';
  return 'var(--green)';
}

function renderEx(ex, type) {
  const badgeMap = {
    heavy:   `<span class="badge badge-heavy">Heavy</span>`,
    hiit:    `<span class="badge badge-hiit">HIIT</span>`,
    must:    `<span class="badge badge-must">Focus</span>`,
    burnout: `<span class="badge badge-burnout">Burnout</span>`,
    cardio:  `<span class="badge badge-cardio">Cardio</span>`,
    '': '',
  };
  return `
    <div class="ex">
      <div class="ex-dot" style="background:${dotColor(type)}; opacity:0.7"></div>
      <div class="ex-name">${ex.name}${badgeMap[ex.badge]||''}</div>
      <div class="ex-scheme">${ex.scheme}</div>
    </div>`;
}

function renderRound(num, desc, exercises, type) {
  const labelColor = type==='push' ? 'var(--push-light)' : type==='pull' ? 'var(--pull-light)' : 'var(--arms-light)';
  return `
    <div class="round">
      <div class="round-head">
        <div class="round-label" style="color:${labelColor}">Round ${num}</div>
        <div class="round-title">${desc}</div>
        <div class="round-meta">3–4 sets · 60–90 sec rest</div>
      </div>
      <div class="round-body">
        ${exercises.map(ex => renderEx(ex, type)).join('')}
      </div>
    </div>`;
}

function renderCircuit() {
  const block = rand(CARDIO_BLOCKS);
  const items = block.work.map(w => `
    <div class="ex">
      <div class="ex-dot" style="background:var(--green); opacity:0.7"></div>
      <div class="ex-name">${w}</div>
      <div class="ex-scheme"></div>
    </div>`).join('');
  return `
    <div class="round round-circuit">
      <div class="round-head">
        <div class="round-label">Round 5 · Circuit</div>
        <div class="round-title">${block.protocol}</div>
        <div class="round-meta">Continuous — no rest between exercises</div>
      </div>
      <div class="round-body">
        <div class="circuit-intro">Equipment: <strong>${block.machine}</strong></div>
        ${items}
      </div>
    </div>`;
}

function buildPush() {
  const hl1 = rand(PUSH.heavyLower.filter(e=>e.must));
  const hl2 = rand(PUSH.heavyLower.filter(e=>e.name!==hl1.name));
  const hu1 = rand(PUSH.heavyUpper.filter(e=>e.must));
  const hu2 = rand(PUSH.heavyUpper.filter(e=>e.name!==hu1.name));
  const hiU1 = rand(PUSH.hiitUpper);
  const hiU2 = rand(PUSH.hiitUpper.filter(e=>e.name!==hiU1.name));
  const hiL1 = rand(PUSH.hiitLower);
  const hiL2 = rand(PUSH.hiitLower.filter(e=>e.name!==hiL1.name));
  const rounds = [
    { desc: 'Heavy Lower + High Intensity Upper', exs: [hl1, hiU1] },
    { desc: 'Heavy Upper + High Intensity Lower', exs: [hu1, hiL1] },
    { desc: 'Heavy Lower + High Intensity Lower', exs: [hl2, hiL2] },
    { desc: 'Heavy Upper + High Intensity Upper', exs: [hu2, hiU2] },
  ];
  return `
    <div class="wo-header-card">
      <div class="wo-eyebrow c-push">Push Day</div>
      <div class="wo-title">Strength + Power</div>
      <div class="wo-meta-row">
        <div class="wo-chip">35–45 min</div>
        <div class="wo-chip">5 rounds</div>
        <div class="wo-chip">3–4 sets</div>
        <div class="wo-chip">2 min round rest</div>
      </div>
    </div>
    <div class="rounds">
      ${rounds.map((r,i) => renderRound(i+1, r.desc, r.exs, 'push')).join('')}
      ${renderCircuit()}
    </div>`;
}

function buildPull() {
  const hh1 = rand(PULL.heavyHinge.filter(e=>e.must));
  const hh2 = rand(PULL.heavyHinge.filter(e=>e.name!==hh1.name));
  const hu1 = rand(PULL.heavyUpper.filter(e=>e.must));
  const hu2 = rand(PULL.heavyUpper.filter(e=>e.name!==hu1.name));
  const hiL1 = rand(PULL.hiitLower);
  const hiL2 = rand(PULL.hiitLower.filter(e=>e.name!==hiL1.name));
  const hiU1 = rand(PULL.hiitUpper);
  const hiU2 = rand(PULL.hiitUpper.filter(e=>e.name!==hiU1.name));
  const rounds = [
    { desc: 'Heavy Hinge + High Intensity Upper', exs: [hh1, hiU1] },
    { desc: 'Heavy Upper + High Intensity Lower', exs: [hu1, hiL1] },
    { desc: 'Heavy Hinge + High Intensity Lower', exs: [hh2, hiL2] },
    { desc: 'Heavy Upper + High Intensity Upper', exs: [hu2, hiU2] },
  ];
  return `
    <div class="wo-header-card">
      <div class="wo-eyebrow c-pull">Pull Day</div>
      <div class="wo-title">Hinge + Pull</div>
      <div class="wo-meta-row">
        <div class="wo-chip">35–45 min</div>
        <div class="wo-chip">5 rounds</div>
        <div class="wo-chip">3–4 sets</div>
        <div class="wo-chip">2 min round rest</div>
      </div>
    </div>
    <div class="rounds">
      ${rounds.map((r,i) => renderRound(i+1, r.desc, r.exs, 'pull')).join('')}
      ${renderCircuit()}
    </div>`;
}

function buildArms() {
  const badgeMap = {
    must:    `<span class="badge badge-must">Focus</span>`,
    burnout: `<span class="badge badge-burnout">Burnout</span>`,
    '': '',
  };
  const blocks = ARMS_PROGRAM.map(block => {
    const exRows = block.exercises.map(ex => `
      <div class="ex">
        <div class="ex-dot" style="background:var(--arms); opacity:0.7"></div>
        <div class="ex-name">${ex.name}${badgeMap[ex.badge]||''}</div>
        <div class="ex-scheme">${ex.scheme}</div>
      </div>`).join('');
    return `
      <div class="round">
        <div class="round-head">
          <div class="round-label" style="color:var(--arms-light)">Block</div>
          <div class="round-title">${block.label}</div>
        </div>
        <div class="round-body">${exRows}</div>
      </div>`;
  }).join('');
  return `
    <div class="wo-header-card">
      <div class="wo-eyebrow c-arms">Arms Day</div>
      <div class="wo-title">Width + Peak</div>
      <div class="wo-meta-row">
        <div class="wo-chip">~30 min</div>
        <div class="wo-chip">Giant Sets</div>
        <div class="wo-chip">Drop Sets</div>
        <div class="wo-chip">Burnout</div>
      </div>
    </div>
    <div class="rounds">${blocks}</div>`;
}

function generate(type) {
  genCount++;
  const workoutEl = document.getElementById('workout');
  const idleEl = document.getElementById('idle');

  let inner = '';
  if (type === 'push') inner = buildPush();
  else if (type === 'pull') inner = buildPull();
  else if (type === 'arms') inner = buildArms();
  else { alert('Type push, pull, or arms'); return; }

  // Update tabs
  ['push','pull','arms'].forEach(t => {
    const tab = document.getElementById('tab-'+t);
    tab.className = 'tab';
    if (t === type) tab.classList.add('active-'+t);
  });

  // Update go button color
  const btn = document.getElementById('go-btn');
  if (type==='push') btn.style.background = 'var(--push)';
  else if (type==='pull') { btn.style.background = 'var(--pull)'; btn.style.color = '#0f1117'; }
  else { btn.style.background = 'var(--arms)'; btn.style.color = '#fff'; }

  const restRules = type !== 'arms' ? `
    <div class="rest-rules">
      <div class="rest-rules-title">Rules</div>
      <div class="rest-grid">
        <div class="rest-item"><div class="rest-item-label">Heavy sets</div><div class="rest-item-value">3–4 × 10–12</div></div>
        <div class="rest-item"><div class="rest-item-label">HIIT sets</div><div class="rest-item-value">3 × 15–20</div></div>
        <div class="rest-item"><div class="rest-item-label">Set rest</div><div class="rest-item-value">60–90 sec</div></div>
        <div class="rest-item"><div class="rest-item-label">Round rest</div><div class="rest-item-value">2 min</div></div>
      </div>
    </div>` : `
    <div class="rest-rules">
      <div class="rest-rules-title">Rules</div>
      <div class="rest-grid">
        <div class="rest-item"><div class="rest-item-label">Moderate</div><div class="rest-item-value">12–15 reps</div></div>
        <div class="rest-item"><div class="rest-item-label">Burnout</div><div class="rest-item-value">15–20 reps</div></div>
        <div class="rest-item"><div class="rest-item-label">Giant set rest</div><div class="rest-item-value">10–15 sec</div></div>
        <div class="rest-item"><div class="rest-item-label">Block rest</div><div class="rest-item-value">90 sec</div></div>
      </div>
    </div>`;

  workoutEl.innerHTML = inner + restRules + `
    <button class="regen-btn" onclick="generate('${type}')">↺ New ${type.charAt(0).toUpperCase()+type.slice(1)} Workout</button>
    <div class="wo-count">Session #${genCount}</div>`;

  idleEl.style.display = 'none';
  workoutEl.classList.remove('show');
  workoutEl.style.display = 'none';
  void workoutEl.offsetWidth;
  workoutEl.style.display = 'block';
  workoutEl.classList.add('show');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function handleInput() {
  const val = document.getElementById('cmd').value.trim().toLowerCase();
  if (['push','pull','arms'].includes(val)) {
    generate(val);
    document.getElementById('cmd').value = '';
  } else {
    document.getElementById('cmd').style.borderColor = 'var(--red)';
    setTimeout(() => document.getElementById('cmd').style.borderColor = 'var(--border)', 600);
  }
}

function quickCmd(type) {
  generate(type);
  document.getElementById('cmd').value = '';
}

document.getElementById('cmd').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleInput();
});
</script>

</body>
</html>
